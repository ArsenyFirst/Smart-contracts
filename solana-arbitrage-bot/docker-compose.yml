version: '3.8'

services:
  jupiter-webhook:
    build: .
    container_name: jupiter-rfq-webhook
    ports:
      - "8080:8080"
    environment:
      - WEBHOOK_HOST=0.0.0.0
      - WEBHOOK_PORT=8080
      - JUPITER_WEBHOOK_SECRET=${JUPITER_WEBHOOK_SECRET:-your_secret_here}
      - JUPITER_API_KEY=${JUPITER_API_KEY:-}
      - SOLANA_RPC_URL=${SOLANA_RPC_URL:-https://api.mainnet-beta.solana.com}
      - SOLANA_PRIVATE_KEY=${SOLANA_PRIVATE_KEY:-}
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./config:/app/config
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - jupiter-network

  nginx:
    image: nginx:alpine
    container_name: jupiter-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      jupiter-webhook:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - jupiter-network

  # Опционально: Redis для кэширования
  redis:
    image: redis:7-alpine
    container_name: jupiter-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - jupiter-network

  # Опционально: Prometheus для метрик
  prometheus:
    image: prom/prometheus:latest
    container_name: jupiter-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - jupiter-network

  # Опционально: Grafana для визуализации
  grafana:
    image: grafana/grafana:latest
    container_name: jupiter-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana:/etc/grafana/provisioning
    restart: unless-stopped
    networks:
      - jupiter-network

volumes:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  jupiter-network:
    driver: bridge